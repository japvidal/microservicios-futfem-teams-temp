spring.application.name=microservicio-futfem-teams-temp
server.port=${PORT:0}
eureka.instance.instance-id=${spring.application.name}:${random.value}

eureka.client.serviceUrl.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

eureka.instance.prefer-ip-address=true

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/futfem}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:my-db2}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.generate-ddl=false
logging.level.org.hibernate.sql=debug
api.docs.server-url=${API_DOCS_SERVER_URL:/api/futfem/teamstemp}
logging.level.root=info
logging.file.name=logs/${spring.application.name}.log
